name: Deploy Docs to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Docusaurus
        run: pnpm build

      # Sync before upload so the build's proxy rules exist before it goes live.
      - name: Sync proxy rules
        uses: bffless/deploy-proxy-rules@v1
        with:
          path: .bffless/proxy-rules/api-backend
          api-url: ${{ vars.ASSET_HOST_URL }}
          api-key: ${{ secrets.ASSET_HOST_KEY }}
          project: bffless/docs

      - name: Upload docs to production
        uses: bffless/upload-artifact@v1
        with:
          path: build
          api-url: ${{ vars.ASSET_HOST_URL }}
          api-key: ${{ secrets.ASSET_HOST_KEY }}
          repository: bffless/docs
          alias: docs-production
          base-path: /build
          proxy-rule-set-names: api-backend
          description: 'Docs production deploy for ${{ github.ref_name }}@${{ github.sha }}'
          summary-title: Docs Production Deploy
