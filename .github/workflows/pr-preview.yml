name: PR Docs Preview

on:
  pull_request:
    # '**' (not '*') so PRs targeting slashed base branches — e.g. the
    # epic/docs-redesign epic branch the redesign stories merge into — also
    # build a preview. A single '*' glob does not match branch names with '/'.
    branches: ['**']

permissions:
  contents: read

jobs:
  build-and-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        # Version comes from package.json "packageManager" (pnpm@10.33.0).
        # Don't also pass `version:` here — action-setup errors on a conflict.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Docusaurus
        run: pnpm build

      - name: Upload docs preview
        uses: bffless/upload-artifact@v1
        with:
          path: build
          api-url: ${{ vars.ASSET_HOST_URL }}
          api-key: ${{ secrets.ASSET_HOST_KEY }}
          alias: docs-preview
          base-path: /build
          description: 'Docs preview for PR #${{ github.event.pull_request.number }}'
          summary-title: Docs Preview Summary
